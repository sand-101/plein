<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Plein ⛽">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0f">
    <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxODAgMTgwIj48cmVjdCB3aWR0aD0iMTgwIiBoZWlnaHQ9IjE4MCIgcng9IjQwIiBmaWxsPSIjMWMxYzFlIi8+PHRleHQgeD0iNTAlIiB5PSI1NSUiIGRvbWluYW50LWJhc2VsaW5lPSJtaWRkbGUiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZvbnQtc2l6ZT0iMTAwIj7im708L3RleHQ+PC9zdmc+">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <title>Plein ⛽</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
        html{height:100%}
        body{min-height:100%;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text',system-ui,sans-serif;background:#0a0a0f;color:#fff;-webkit-user-select:none;user-select:none;-webkit-overflow-scrolling:touch;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
        .app{max-width:420px;margin:0 auto;padding:12px 18px 50px}

        .lang-bar{display:flex;justify-content:center;gap:4px;padding:14px 0 2px;flex-wrap:wrap}
        .lang-btn{width:40px;height:32px;border-radius:8px;border:2px solid transparent;background:#1c1c1e;font-size:18px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
        .lang-btn:active{transform:scale(.92)}
        .lang-btn.on{border-color:#ff9500;background:#2c2c2e}

        .currency-bar{display:flex;justify-content:center;gap:6px;padding:8px 0 4px;flex-wrap:wrap}
        .cur-pill{padding:5px 12px;border-radius:14px;border:1.5px solid #3a3a3c;background:transparent;color:#aaa;font-size:12px;font-weight:600;font-family:-apple-system,sans-serif;cursor:pointer;transition:all .15s}
        .cur-pill:active{transform:scale(.94)}
        .cur-pill.on{background:#ff9500;border-color:#ff9500;color:#000}

        .header{text-align:center;padding:10px 0 6px}
        .header h1{font-size:26px;font-weight:700;letter-spacing:-.5px}
        .header .sub{font-size:14px;color:#8e8e93;margin-top:3px}

        .card{background:#1c1c1e;border-radius:16px;margin-bottom:14px;padding:20px;animation:cardIn .45s cubic-bezier(.21,1.02,.73,1) both}
        .card:nth-child(2){animation-delay:.03s}.card:nth-child(3){animation-delay:.06s}.card:nth-child(4){animation-delay:.09s}.card:nth-child(5){animation-delay:.12s}.card:nth-child(6){animation-delay:.15s}.card:nth-child(7){animation-delay:.18s}.card:nth-child(8){animation-delay:.21s}
        @keyframes cardIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
        .card-label{font-size:12px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px}

        /* TANK */
        .tank-card{padding:18px}
        .tank-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
        .tank-visual{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
        .tank-icon-box{width:48px;height:48px;border-radius:12px;background:rgba(255,149,0,.1);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
        .tank-info{flex:1;min-width:0}
        .tank-val{font-size:28px;font-weight:700;letter-spacing:-1px;font-variant-numeric:tabular-nums}
        .tank-val span{font-size:16px;font-weight:500;color:#8e8e93;margin-left:2px}
        .tank-sub{font-size:12px;color:#636366;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .stepper{display:flex;align-items:center;background:#2c2c2e;border-radius:10px;overflow:hidden;flex-shrink:0;border:1px solid #3a3a3c}
        .stepper button{width:44px;height:40px;border:none;background:transparent;color:#ff9500;font-size:22px;font-weight:500;font-family:-apple-system,sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .1s}
        .stepper button:active{background:rgba(255,149,0,.15)}
        .stepper .sep{width:1px;height:22px;background:#48484a}
        .tank-bar-wrap{margin-top:12px;height:6px;background:#2c2c2e;border-radius:3px;overflow:hidden}
        .tank-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,#ff9f0a,#ff6723);transition:width .3s ease;min-width:2px}
        .tank-bar-labels{display:flex;justify-content:space-between;margin-top:5px}
        .tank-bar-labels span{font-size:10px;color:#636366}
        .tank-presets{display:flex;gap:6px;margin-top:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;scrollbar-width:none}
        .tank-presets::-webkit-scrollbar{display:none}
        .tp{flex-shrink:0;padding:7px 12px;border-radius:18px;border:1.5px solid #3a3a3c;background:transparent;color:#e5e5ea;font-size:11.5px;font-weight:500;font-family:-apple-system,sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap}
        .tp:active{transform:scale(.94)}
        .tp.on{background:#ff9500;border-color:#ff9500;color:#000;font-weight:600}

        /* GAUGE */
        .gauge-card{padding:22px 18px 16px;background:linear-gradient(180deg,#1c1c1e,#17171a)}
        .gauge-wrap{display:flex;flex-direction:column;align-items:center}
        .gauge-box{position:relative;width:240px;height:145px}
        .gauge-svg{width:100%;height:100%;overflow:visible}
        .g-bg{fill:none;stroke:#2c2c2e;stroke-width:15;stroke-linecap:round}
        .g-fill{fill:none;stroke-width:15;stroke-linecap:round;transition:stroke-dashoffset .4s cubic-bezier(.25,.46,.45,.94),stroke .4s ease;filter:drop-shadow(0 0 6px rgba(255,149,0,.25))}
        .g-tick{stroke:#48484a;stroke-width:1.5}.g-tick-major{stroke:#636366;stroke-width:2.5}
        .g-lbl{fill:#8e8e93;font-size:11px;font-family:-apple-system,sans-serif;font-weight:500}
        .g-needle{transition:transform .4s cubic-bezier(.25,.46,.45,.94);transform-origin:120px 120px}
        .g-needle-bar{fill:#ff3b30;filter:drop-shadow(0 0 3px rgba(255,59,48,.5))}
        .g-needle-cap1{fill:#3a3a3c}.g-needle-cap2{fill:#636366}
        .g-val{display:flex;align-items:baseline;justify-content:center;gap:4px;margin-top:12px}
        .g-pct{font-size:42px;font-weight:700;letter-spacing:-2px;font-variant-numeric:tabular-nums}
        .g-pct-sign{font-size:20px;font-weight:600;color:#8e8e93}
        .g-liters{font-size:14px;color:#8e8e93;text-align:center;margin-top:2px}
        .q-btns{display:flex;gap:6px;margin-top:18px;width:100%}
        .q-btn{flex:1;padding:10px 2px;border-radius:10px;border:none;background:#2c2c2e;color:#fff;font-size:13px;font-weight:600;font-family:-apple-system,sans-serif;cursor:pointer;transition:all .15s}
        .q-btn:active{transform:scale(.94);background:#3a3a3c}
        .q-btn.on{background:#ff9500;color:#000}
        .q-btn small{display:block;font-size:10px;font-weight:400;opacity:.55;margin-top:1px}
        .slider-sec{margin-top:18px}
        input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:3px;background:#2c2c2e;outline:none}
        input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:30px;height:30px;border-radius:50%;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.35),0 0 0 1px rgba(0,0,0,.06)}
        .slider-marks{display:flex;justify-content:space-between;margin-top:7px}
        .slider-marks span{font-size:10px;color:#636366;font-weight:500}

        .alert{display:none;align-items:center;gap:10px;background:rgba(255,59,48,.1);border:1px solid rgba(255,59,48,.18);border-radius:14px;padding:13px 15px;margin-bottom:14px;animation:fadeIn .3s ease}
        .alert.on{display:flex}
        .alert-dot{width:10px;height:10px;border-radius:50%;background:#ff3b30;flex-shrink:0;animation:blink 1.8s infinite}
        .alert-txt{font-size:13px;color:#ff6961;font-weight:500;line-height:1.35}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

        /* PRICE */
        .price-card{padding:16px 18px}
        .price-row{display:flex;align-items:center;background:#2c2c2e;border-radius:12px;overflow:hidden;border:2px solid transparent;transition:border-color .2s}
        .price-row:focus-within{border-color:#ff9500}
        .price-row .sym{padding:13px;font-size:19px;font-weight:700;color:#ff9500;background:rgba(255,149,0,.08);min-width:48px;text-align:center}
        .price-row input[type=number]{flex:1;background:transparent;border:none;color:#fff;font-size:21px;font-weight:600;padding:13px 10px;outline:none;font-family:-apple-system,sans-serif;min-width:0;-webkit-user-select:text;user-select:text}
        .price-row input::placeholder{color:#48484a}
        .price-row .unit{padding:13px;font-size:13px;color:#636366;font-weight:500;white-space:nowrap}
        input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
        input[type=number]{-moz-appearance:textfield}
        .pills{display:flex;gap:6px;margin-top:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;scrollbar-width:none}
        .pills::-webkit-scrollbar{display:none}
        .pill{flex-shrink:0;padding:8px 13px;border-radius:20px;border:1.5px solid #3a3a3c;background:transparent;color:#e5e5ea;font-size:12.5px;font-weight:500;font-family:-apple-system,sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap}
        .pill:active{transform:scale(.94)}
        .pill.on{background:#ff9500;border-color:#ff9500;color:#000;font-weight:600}

        /* RESULT */
        .res-card{background:linear-gradient(145deg,#1c1c1e,#19191d);border:1px solid #2c2c2e;padding:26px 20px 22px}
        .res-top{text-align:center;padding-bottom:22px;margin-bottom:18px;border-bottom:1px solid rgba(255,255,255,.05)}
        .res-lbl{font-size:12px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
        .res-amount{font-size:48px;font-weight:800;letter-spacing:-2px;background:linear-gradient(135deg,#ff9f0a,#ff6723);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;font-variant-numeric:tabular-nums;word-break:break-all}
        .res-detail{font-size:13px;color:#8e8e93;margin-top:6px}
        .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .stat{background:#2c2c2e;border-radius:13px;padding:14px;text-align:center}
        .stat-v{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums}
        .stat-l{font-size:10px;color:#8e8e93;font-weight:500;text-transform:uppercase;letter-spacing:.3px;margin-top:3px;line-height:1.3}

        /* ===== STATIONS CARD ===== */
        .stations-card{padding:18px;overflow:hidden}

        .locate-btn{
            width:100%;padding:14px;border:none;border-radius:12px;
            background:linear-gradient(135deg,#007aff,#5856d6);
            color:#fff;font-size:15px;font-weight:600;
            font-family:-apple-system,sans-serif;
            cursor:pointer;transition:all .15s;
            display:flex;align-items:center;justify-content:center;gap:8px;
        }
        .locate-btn:active{transform:scale(.97);opacity:.85}
        .locate-btn:disabled{opacity:.5;transform:none}
        .locate-btn .spinner{display:none;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
        .locate-btn.loading .spinner{display:block}
        .locate-btn.loading .btn-icon{display:none}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* Radius selector */
        .radius-row{display:flex;align-items:center;gap:10px;margin-top:14px}
        .radius-row label{font-size:12px;color:#8e8e93;white-space:nowrap}
        .radius-row input[type=range]{flex:1}
        .radius-val{font-size:13px;font-weight:600;color:#ff9500;min-width:45px;text-align:right}

        /* Fuel type filter */
        .fuel-filter{display:flex;gap:6px;margin-top:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;scrollbar-width:none}
        .fuel-filter::-webkit-scrollbar{display:none}
        .ff-btn{flex-shrink:0;padding:7px 13px;border-radius:18px;border:1.5px solid #3a3a3c;background:transparent;color:#e5e5ea;font-size:12px;font-weight:500;font-family:-apple-system,sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap}
        .ff-btn:active{transform:scale(.94)}
        .ff-btn.on{background:#007aff;border-color:#007aff;color:#fff;font-weight:600}

        /* Map */
        .map-wrap{margin-top:14px;border-radius:14px;overflow:hidden;height:260px;background:#2c2c2e;position:relative}
        .map-wrap.hidden{display:none}
        #map{width:100%;height:100%}
        .leaflet-control-attribution{display:none!important}
        .leaflet-tile-pane{filter:brightness(.8) contrast(1.1) saturate(.8)}

        /* Station list */
        .station-list{margin-top:14px}
        .station-list.hidden{display:none}

        .station-item{
            display:flex;align-items:center;gap:12px;
            padding:14px;background:#2c2c2e;border-radius:13px;
            margin-bottom:8px;cursor:pointer;transition:all .15s;
            position:relative;overflow:hidden;
        }
        .station-item:active{transform:scale(.98);background:#3a3a3c}
        .station-item.cheapest{border:1.5px solid rgba(48,209,88,.3);background:rgba(48,209,88,.06)}

        .station-rank{
            width:32px;height:32px;border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            font-size:14px;font-weight:700;flex-shrink:0;
            background:#3a3a3c;color:#fff;
        }
        .station-item.cheapest .station-rank{background:#30d158;color:#000}

        .station-info{flex:1;min-width:0}
        .station-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .station-addr{font-size:11px;color:#8e8e93;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .station-dist{font-size:11px;color:#636366;margin-top:1px}

        .station-price-box{text-align:right;flex-shrink:0}
        .station-price{font-size:20px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums}
        .station-item.cheapest .station-price{color:#30d158}
        .station-price-unit{font-size:10px;color:#636366}
        .station-savings{font-size:11px;color:#30d158;font-weight:600;margin-top:2px}

        .station-empty{text-align:center;padding:30px 20px;color:#636366;font-size:13px;line-height:1.5}
        .station-empty .empty-icon{font-size:36px;margin-bottom:10px}

        /* Use price button */
        .use-price-tag{
            display:inline-block;margin-top:6px;padding:4px 10px;
            border-radius:8px;background:rgba(255,149,0,.12);
            color:#ff9500;font-size:10px;font-weight:600;
            text-transform:uppercase;letter-spacing:.3px;
        }

        .save-toast{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-80px);background:#2c2c2e;color:#fff;padding:10px 20px;border-radius:22px;font-size:13px;font-weight:500;box-shadow:0 8px 30px rgba(0,0,0,.4);transition:transform .35s cubic-bezier(.21,1.02,.73,1),opacity .35s;opacity:0;z-index:1000;pointer-events:none}
        .save-toast.show{transform:translateX(-50%) translateY(0);opacity:1}

        @media(max-height:480px){.gauge-card{display:none}.header{padding:10px 0 4px}.header h1{font-size:20px}.map-wrap{height:180px}}
    </style>
</head>
<body>
<div class="save-toast" id="toast">💾</div>
<div class="app">

    <div class="lang-bar" id="langBar"></div>
    <div class="currency-bar" id="curBar"></div>

    <div class="header">
        <h1 id="hTitle">⛽ Plein d'Essence</h1>
        <p class="sub" id="hSub">Réservoir 42 L</p>
    </div>

    <!-- STATIONS -->
    <div class="card stations-card">
        <div class="card-label" id="lStations">📍 Stations à proximité</div>

        <button class="locate-btn" id="locateBtn">
            <span class="btn-icon">📍</span>
            <span class="spinner"></span>
            <span id="locateTxt">Trouver les stations proches</span>
        </button>

        <div class="radius-row">
            <label id="lRadius">Rayon :</label>
            <input type="range" id="radiusSlider" min="1" max="30" value="5" step="1">
            <span class="radius-val" id="radiusVal">5 km</span>
        </div>

        <div class="fuel-filter" id="fuelFilter"></div>

        <div class="map-wrap hidden" id="mapWrap">
            <div id="map"></div>
        </div>

        <div class="station-list hidden" id="stationList"></div>
    </div>

    <!-- TANK -->
    <div class="card tank-card">
        <div class="card-label" id="lTank"></div>
        <div class="tank-row">
            <div class="tank-visual">
                <div class="tank-icon-box">🛢️</div>
                <div class="tank-info">
                    <div class="tank-val" id="tankVal">42<span>L</span></div>
                    <div class="tank-sub" id="tankSub"></div>
                </div>
            </div>
            <div class="stepper"><button id="btnMinus">−</button><div class="sep"></div><button id="btnPlus">+</button></div>
        </div>
        <div class="tank-bar-wrap"><div class="tank-bar" id="tankBar"></div></div>
        <div class="tank-bar-labels"><span>10 L</span><span>50 L</span><span>100 L</span></div>
        <div class="tank-presets" id="tankPresets"></div>
    </div>

    <!-- GAUGE -->
    <div class="card gauge-card">
        <div class="card-label" id="lLevel"></div>
        <div class="gauge-wrap">
            <div class="gauge-box">
                <svg class="gauge-svg" viewBox="0 0 240 148">
                    <path class="g-bg" d="M 22 130 A 100 100 0 0 1 218 130" id="gBg"/>
                    <path class="g-fill" d="M 22 130 A 100 100 0 0 1 218 130" id="gFill" stroke="#ff3b30"/>
                    <line x1="30" y1="123" x2="40" y2="115" class="g-tick-major"/>
                    <line x1="42" y1="58" x2="54" y2="64" class="g-tick"/>
                    <line x1="120" y1="25" x2="120" y2="39" class="g-tick-major"/>
                    <line x1="195" y1="58" x2="183" y2="64" class="g-tick"/>
                    <line x1="210" y1="123" x2="200" y2="115" class="g-tick-major"/>
                    <line x1="32" y1="89" x2="43" y2="87" class="g-tick" style="stroke:#3a3a3c"/>
                    <line x1="74" y1="40" x2="80" y2="50" class="g-tick" style="stroke:#3a3a3c"/>
                    <line x1="160" y1="40" x2="154" y2="50" class="g-tick" style="stroke:#3a3a3c"/>
                    <line x1="207" y1="89" x2="196" y2="87" class="g-tick" style="stroke:#3a3a3c"/>
                    <text x="14" y="142" class="g-lbl" text-anchor="middle">0</text>
                    <text x="120" y="19" class="g-lbl" text-anchor="middle">½</text>
                    <text x="228" y="142" class="g-lbl" text-anchor="middle">1</text>
                    <text x="203" y="108" style="font-size:12px;fill:#636366">⛽</text>
                    <g class="g-needle" id="needle">
                        <polygon class="g-needle-bar" points="120,42 117,118 120,123 123,118"/>
                        <circle class="g-needle-cap1" cx="120" cy="120" r="8"/>
                        <circle class="g-needle-cap2" cx="120" cy="120" r="4.5"/>
                    </g>
                </svg>
            </div>
            <div class="g-val"><span class="g-pct" id="dPct">12</span><span class="g-pct-sign">%</span></div>
            <div class="g-liters" id="dLiters"></div>
            <div class="q-btns" id="qBtnsWrap"></div>
        </div>
        <div class="slider-sec">
            <input type="range" id="sLevel" min="0" max="100" value="12" step="1">
            <div class="slider-marks" id="sliderMarks"></div>
        </div>
    </div>

    <div class="alert" id="alertBox"><div class="alert-dot"></div><span class="alert-txt" id="alertTxt"></span></div>

    <!-- PRICE -->
    <div class="card price-card">
        <div class="card-label" id="lPrice"></div>
        <div class="price-row">
            <span class="sym" id="pSym">€</span>
            <input type="number" id="iPrice" value="1.72" step="0.01" min="0" placeholder="1.72" inputmode="decimal" enterkeyhint="done">
            <span class="unit" id="pUnit">/ litre</span>
        </div>
        <div class="pills" id="pillsWrap"></div>
    </div>

    <!-- RESULT -->
    <div class="card res-card">
        <div class="res-top">
            <div class="res-lbl" id="lResult"></div>
            <div class="res-amount" id="rAmount"></div>
            <div class="res-detail" id="rDetail"></div>
        </div>
        <div class="stats">
            <div class="stat"><div class="stat-v" id="sAdd"></div><div class="stat-l" id="lAdd"></div></div>

function fmt(n,d=1){return n.toFixed(d).replace('.',C.decSep)}
function fmtCur(n){const isJ=cur==='JPY',d=isJ?0:2;let v=n.toFixed(d);const p=v.split('.');p[0]=p[0].replace(/\B(?=(\d{3})+(?!\d))/g,C.thousSep);v=p.join(C.decSep);return C.after?v+' '+C.symbol:C.symbol+' '+v}

// ==================== TANK ====================
function tankCat(t){const c=L_.cat;if(t<=30)return c.xs;if(t<=40)return c.s;if(t<=47)return c.m;if(t<=55)return c.l;if(t<=65)return c.xl;if(t<=80)return c.xxl;return c.xxxl}
function updateTankUI(){$('tankVal').innerHTML=tank+'<span>L</span>';$('tankSub').textContent=tankCat(tank);$('hSub').textContent=L_.sub.replace('{n}',tank);$('sCap').textContent=tank+' L';$('tankBar').style.width=Math.max(0,Math.min(100,((tank-10)/90)*100))+'%';document.querySelectorAll('.tp').forEach(p=>p.classList.toggle('on',parseInt(p.dataset.t)===tank))}
function buildTankPresets(){const w=$('tankPresets');w.innerHTML='';Object.entries(L_.vehicles).forEach(([v,l])=>{const b=document.createElement('button');b.className='tp'+(parseInt(v)===tank?' on':'');b.dataset.t=v;b.textContent=l;b.addEventListener('click',()=>{tank=parseInt(v);updateTankUI();buildQuickBtns();save();calc();showToast(L_.toastTank.replace('{n}',tank))});w.appendChild(b)})}
function buildQuickBtns(){const w=$('qBtnsWrap');w.innerHTML='';[{l:0,label:L_.empty},{l:12,label:L_.reserve},{l:25,label:'¼'},{l:50,label:'½'},{l:75,label:'¾'}].forEach(({l,label})=>{const b=document.createElement('button');b.className='q-btn';b.dataset.l=l;b.innerHTML=label+'<small>'+fmt((l/100)*tank)+' L</small>';b.addEventListener('click',()=>{lvl=l;sLevel.value=lvl;save();calc()});w.appendChild(b)})}
function buildSliderMarks(){const w=$('sliderMarks');w.innerHTML='';L_.sliderMarks.forEach(t=>{const s=document.createElement('span');s.textContent=t;w.appendChild(s)})}
function buildFuelPills(){const w=$('pillsWrap');w.innerHTML='';(FUEL_PRICES[cur]||FUEL_PRICES.EUR).forEach(fuel=>{const n=fuel.names[lang]||fuel.names.en||'';const b=document.createElement('button');b.className='pill'+(Math.abs(fuel.p-prc)<0.005?' on':'');b.dataset.p=fuel.p;b.textContent=n+' · '+fmtPS(fuel.p);b.addEventListener('click',()=>{prc=fuel.p;iPrice.value=cur==='JPY'?prc.toFixed(0):prc.toFixed(2);document.querySelectorAll('.pill').forEach(x=>x.classList.remove('on'));b.classList.add('on');save();calc()});w.appendChild(b)})}

function gColor(p){if(p<=12)return'#ff3b30';if(p<=25)return'#ff6723';if(p<=40)return'#ff9f0a';if(p<=65)return'#ffd60a';return'#30d158'}
function calc(){const cL=(lvl/100)*tank,add=tank-cL,cost=add*prc,full=tank*prc;gFill.style.strokeDashoffset=arcLen-(arcLen*lvl/100);gFill.style.stroke=gColor(lvl);needleEl.style.transform='rotate('+(-90+(lvl/100)*180)+'deg)';$('dPct').textContent=lvl;$('dLiters').textContent=L_.inTank.replace('{n}',fmt(cL));$('rAmount').textContent=fmtCur(cost);$('rDetail').textContent=fmt(add)+' L × '+fmtPS(prc)+' '+C.symbol+'/L';$('sAdd').textContent=fmt(add)+' L';$('sCur').textContent=fmt(cL)+' L';$('sFull').textContent=fmtCur(full);$('alertBox').classList.toggle('on',lvl<=12);$('qBtnsWrap').querySelectorAll('.q-btn').forEach(b=>b.classList.toggle('on',parseInt(b.dataset.l)===lvl))}
function save(){localStorage.setItem('tank',tank);localStorage.setItem('lvl',lvl);localStorage.setItem('prc',prc)}

let toastT;function showToast(m){clearTimeout(toastT);$('toast').textContent=m;$('toast').classList.add('show');toastT=setTimeout(()=>$('toast').classList.remove('show'),1800)}

// Stepper
function changeTank(d){const n=tank+d;if(n<10||n>120)return;tank=n;updateTankUI();buildQuickBtns();save();calc()}
$('btnMinus').addEventListener('click',()=>changeTank(-1));$('btnPlus').addEventListener('click',()=>changeTank(1));
let holdTimer=null,holdSpeed=500;
function startHold(d){holdSpeed=400;changeTank(d);holdTimer=setTimeout(function r(){changeTank(d);holdSpeed=Math.max(60,holdSpeed*.8);holdTimer=setTimeout(r,holdSpeed)},holdSpeed)}
function stopHold(){clearTimeout(holdTimer);holdTimer=null;showToast(L_.toastTank.replace('{n}',tank))}
['touchstart','mousedown'].forEach(e=>{$('btnMinus').addEventListener(e,ev=>{ev.preventDefault();startHold(-1)},{passive:false});$('btnPlus').addEventListener(e,ev=>{ev.preventDefault();startHold(1)},{passive:false})});
['touchend','touchcancel','mouseup','mouseleave'].forEach(e=>{$('btnMinus').addEventListener(e,stopHold);$('btnPlus').addEventListener(e,stopHold)});

sLevel.addEventListener('input',e=>{lvl=+e.target.value;save();calc()});
iPrice.addEventListener('input',()=>{prc=parseFloat(iPrice.value)||0;document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));save();calc()});
iPrice.addEventListener('keydown',e=>{if(e.key==='Enter')iPrice.blur()});
document.querySelectorAll('input[type=number]').forEach(inp=>{inp.addEventListener('focus',()=>{setTimeout(()=>inp.scrollIntoView({behavior:'smooth',block:'center'}),300)})});

// ==================== STATIONS ====================
const radiusSlider=$('radiusSlider');
const radiusVal=$('radiusVal');
radiusSlider.addEventListener('input',()=>{
    radiusVal.textContent=radiusSlider.value+' km';
    if(userLat&&stationsData.length) renderStations();
});

// Fuel filter
function buildFuelFilter(){
    const w=$('fuelFilter');w.innerHTML='';
    // "All" button
    const allBtn=document.createElement('button');
    allBtn.className='ff-btn'+(selectedFuelFilter==='all'?' on':'');
    allBtn.textContent=L_.allFuels;
    allBtn.addEventListener('click',()=>{selectedFuelFilter='all';buildFuelFilter();renderStations()});
    w.appendChild(allBtn);
    FUEL_TYPES_FR.forEach(ft=>{
        const b=document.createElement('button');
        b.className='ff-btn'+(selectedFuelFilter===ft?' on':'');
        b.textContent=ft;
        b.addEventListener('click',()=>{selectedFuelFilter=ft;buildFuelFilter();renderStations()});
        w.appendChild(b);
    });
}

// Locate button
$('locateBtn').addEventListener('click',locateAndFetch);

function locateAndFetch(){
    const btn=$('locateBtn');
    btn.classList.add('loading');btn.disabled=true;
    $('locateTxt').textContent=L_.locating;

    if(!navigator.geolocation){
        btn.classList.remove('loading');btn.disabled=false;
        $('locateTxt').textContent=L_.locateBtn;
        showToast('❌ '+L_.geoError);return;
    }

    navigator.geolocation.getCurrentPosition(
        pos=>{
            userLat=pos.coords.latitude;
            userLon=pos.coords.longitude;
            fetchStations().then(()=>{
                btn.classList.remove('loading');btn.disabled=false;
                $('locateTxt').textContent=L_.locateBtn;
            });
        },
        err=>{
            btn.classList.remove('loading');btn.disabled=false;
            $('locateTxt').textContent=L_.locateBtn;
            showToast('❌ '+L_.geoError);
        },
        {enableHighAccuracy:true,timeout:10000,maximumAge:60000}
    );
}

async function fetchStations(){
    try{
        // French government open data API
        const radius=parseInt(radiusSlider.value)*1000; // km to m
        const url=`https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?`+
            `where=within_distance(geom,geom'POINT(${userLon} ${userLat})',${radius}m)&`+
            `limit=60&`+
            `select=id,adresse,ville,cp,geom,prix_maj,prix_nom,prix_valeur,horaires,services_service,marque`;

        const resp=await fetch(url);
        if(!resp.ok) throw new Error('API error');
        const data=await resp.json();

        // Group by station
        const stationMap={};
        (data.results||[]).forEach(r=>{
            const id=r.id;
            if(!stationMap[id]){
                stationMap[id]={
                    id,
                    name:r.marque||r.ville||'Station',
                    addr:r.adresse||'',
                    city:r.ville||'',
                    cp:r.cp||'',
                    lat:r.geom?.lat||0,
                    lon:r.geom?.lon||0,
                    fuels:{},
                    services:r.services_service||''
                };
            }
            if(r.prix_nom&&r.prix_valeur){
                stationMap[id].fuels[r.prix_nom]={
                    price:parseFloat(r.prix_valeur),
                    updated:r.prix_maj||''
                };
            }
        });

        // To array + calc distance
        stationsData=Object.values(stationMap).map(s=>{
            s.dist=haversine(userLat,userLon,s.lat,s.lon);
            return s;
        });

        renderStations();
        initMap();
    }catch(e){
        console.error(e);
        showToast('❌ '+L_.stationError);
        $('stationList').innerHTML='<div class="station-empty"><div class="empty-icon">📡</div>'+L_.stationError+'</div>';
        $('stationList').classList.remove('hidden');
    }
}

function haversine(lat1,lon1,lat2,lon2){
    const R=6371;
    const dLat=(lat2-lat1)*Math.PI/180;
    const dLon=(lon2-lon1)*Math.PI/180;
    const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function renderStations(){
    const list=$('stationList');
    const radius=parseInt(radiusSlider.value);

    // Filter by fuel type + radius
    let filtered=stationsData.filter(s=>s.dist<=radius);
    if(selectedFuelFilter!=='all'){
        filtered=filtered.filter(s=>s.fuels[selectedFuelFilter]);
    }

    // Sort by cheapest selected fuel (or first available)
    filtered.sort((a,b)=>{
        const pa=getBestPrice(a);
        const pb=getBestPrice(b);
        if(pa===null&&pb===null)return a.dist-b.dist;
        if(pa===null)return 1;
        if(pb===null)return -1;
        return pa-pb;
    });

    if(!filtered.length){
        list.innerHTML='<div class="station-empty"><div class="empty-icon">🔍</div>'+L_.noStations+'</div>';
        list.classList.remove('hidden');
        updateMapMarkers(filtered);
        return;
    }

    const cheapestPrice=getBestPrice(filtered[0]);

    list.innerHTML=filtered.slice(0,20).map((s,i)=>{
        const price=getBestPrice(s);
        const isCheapest=i===0&&price!==null;
        const savings=price&&cheapestPrice&&!isCheapest?(price-cheapestPrice)*(tank-(lvl/100)*tank):0;
        const fuelLabel=selectedFuelFilter!=='all'?selectedFuelFilter:getMainFuelName(s);

        return `
        <div class="station-item${isCheapest?' cheapest':''}" onclick="useStationPrice(${price})" data-lat="${s.lat}" data-lon="${s.lon}">
            <div class="station-rank">${i+1}</div>
            <div class="station-info">
                <div class="station-name">${escHtml(s.name)}</div>
                <div class="station-addr">${escHtml(s.addr)}, ${escHtml(s.cp)} ${escHtml(s.city)}</div>
                <div class="station-dist">📍 ${s.dist<1?(s.dist*1000).toFixed(0)+' m':s.dist.toFixed(1)+' km'}${fuelLabel?' — '+fuelLabel:''}</div>
                ${isCheapest?'<span class="use-price-tag">🏆 '+L_.cheapest+'</span>':''}
            </div>
            <div class="station-price-box">
                ${price!==null?`<div class="station-price">${fmtPS(price)}</div><div class="station-price-unit">${C.symbol}${L_.perLiterLabel}</div>`:'<div class="station-price" style="font-size:14px;color:#636366">—</div>'}
                ${savings>0.01?'<div class="station-savings">+'+fmtCur(savings)+'</div>':''}
            </div>
            <div style="position:absolute;bottom:8px;right:14px;">
                <a href="https://maps.apple.com/?daddr=${s.lat},${s.lon}&dirflg=d" 
                   onclick="event.stopPropagation()" 
                   style="font-size:11px;color:#007aff;text-decoration:none;font-weight:600">
                   ${L_.navigate} →
                </a>
            </div>
        </div>`;
    }).join('');

    list.classList.remove('hidden');
    updateMapMarkers(filtered.slice(0,20));
}

function getBestPrice(station){
    if(selectedFuelFilter!=='all'){
        return station.fuels[selectedFuelFilter]?.price||null;
    }
    const prices=Object.values(station.fuels).map(f=>f.price).filter(p=>p>0);
    return prices.length?Math.min(...prices):null;
}

function getMainFuelName(station){
    if(selectedFuelFilter!=='all')return selectedFuelFilter;
    let min=Infinity,name='';
    Object.entries(station.fuels).forEach(([k,v])=>{if(v.price<min){min=v.price;name=k}});
    return name;
}

function escHtml(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

function useStationPrice(price){
    if(price===null)return;
    prc=price;
    iPrice.value=cur==='JPY'?prc.toFixed(0):prc.toFixed(2);
    document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));
    save();calc();
    showToast('✅ '+L_.usePrice+' : '+fmtPS(price)+' '+C.symbol);
    // Scroll to result
    document.querySelector('.res-card').scrollIntoView({behavior:'smooth',block:'center'});
}

// ==================== MAP ====================
function initMap(){
    const wrap=$('mapWrap');
    wrap.classList.remove('hidden');

    if(!leafletMap){
        leafletMap=L.map('map',{
            zoomControl:false,
            attributionControl:false
        }).setView([userLat,userLon],13);

        // Dark tile layer
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
            maxZoom:19
        }).addTo(leafletMap);

        markersLayer=L.layerGroup().addTo(leafletMap);
    }else{
        leafletMap.setView([userLat,userLon],13);
    }

    // Fix map size after display
    setTimeout(()=>leafletMap.invalidateSize(),100);
}

function updateMapMarkers(stations){
    if(!markersLayer)return;
    markersLayer.clearLayers();

    // User marker
    const userIcon=L.divIcon({
        html:'<div style="width:14px;height:14px;background:#007aff;border:3px solid #fff;border-radius:50%;box-shadow:0 0 8px rgba(0,122,255,.5)"></div>',
        className:'',iconSize:[14,14],iconAnchor:[7,7]
    });
    L.marker([userLat,userLon],{icon:userIcon}).addTo(markersLayer);

    stations.forEach((s,i)=>{
        const price=getBestPrice(s);
        const color=i===0?'#30d158':'#ff9500';
        const icon=L.divIcon({
            html:`<div style="background:${color};color:#000;padding:3px 7px;border-radius:10px;font-size:11px;font-weight:700;font-family:-apple-system,sans-serif;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.3)">${price!==null?fmtPS(price):'⛽'}</div>`,
            className:'',iconAnchor:[25,12]
        });
        const marker=L.marker([s.lat,s.lon],{icon}).addTo(markersLayer);
        marker.on('click',()=>useStationPrice(price));
    });

    // Fit bounds
    if(stations.length){
        const bounds=L.latLngBounds([[userLat,userLon],...stations.map(s=>[s.lat,s.lon])]);
        leafletMap.fitBounds(bounds,{padding:[30,30],maxZoom:14});
    }
}

// ==================== INIT ====================
function init(){
    arcLen=gBg.getTotalLength();
    gFill.style.strokeDasharray=arcLen;
    iPrice.value=cur==='JPY'?prc.toFixed(0):prc.toFixed(2);
    iPrice.step=cur==='JPY'?'1':'0.01';
    sLevel.value=lvl;
    buildLangBar();buildCurBar();rebuildAll();
}
window.addEventListener('load',init);
</script>
