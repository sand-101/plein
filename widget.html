<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Easy Refuel Widget</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:-apple-system,BlinkMacSystemFont,sans-serif;
            background:#0a0a0f;color:#fff;
            padding:env(safe-area-inset-top) 16px 16px;
            min-height:100vh;
        }
        .w{max-width:380px;margin:0 auto}

        .wh{
            text-align:center;padding:20px 0 12px;
            font-size:22px;font-weight:700;
        }
        .wh small{font-size:12px;color:#636366;display:block;margin-top:4px;font-weight:400}

        .wc{
            background:#1c1c1e;border-radius:16px;
            padding:18px;margin-bottom:12px;
            border:1px solid rgba(255,255,255,.04);
        }

        .wl{font-size:11px;color:#8e8e93;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}

        .ws-row{display:flex;align-items:center;gap:12px}
        .ws-icon{font-size:28px}
        .ws-info{flex:1}
        .ws-name{font-size:16px;font-weight:600}
        .ws-dist{font-size:12px;color:#636366;margin-top:2px}
        .ws-price{font-size:28px;font-weight:800;color:#ff9500;flex-shrink:0}
        .ws-unit{font-size:11px;color:#636366}

        .wp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .wp-box{
            background:#2c2c2e;border-radius:12px;
            padding:14px;text-align:center;
        }
        .wp-value{font-size:22px;font-weight:800}
        .wp-value.orange{color:#ff9500}
        .wp-value.green{color:#30d158}
        .wp-label{font-size:10px;color:#8e8e93;margin-top:4px;text-transform:uppercase}

        .wf{
            display:flex;align-items:center;gap:12px;
            background:#2c2c2e;border-radius:12px;
            padding:12px 14px;
        }
        .wf-icon{font-size:22px}
        .wf-info{flex:1}
        .wf-text{font-size:13px;color:#aaa}
        .wf-date{font-size:10px;color:#636366;margin-top:1px}
        .wf-cost{font-size:18px;font-weight:700}

        .wa{
            display:block;text-align:center;padding:16px;
            background:linear-gradient(135deg,#007aff,#5856d6);
            color:#fff;border-radius:14px;
            font-size:16px;font-weight:600;
            text-decoration:none;margin-top:16px;
            box-shadow:0 4px 15px rgba(0,122,255,.25);
        }
        .wa:active{opacity:.8}

        .wgo{
            display:block;text-align:center;padding:14px;
            background:rgba(48,209,88,.12);
            color:#30d158;border-radius:12px;
            font-size:14px;font-weight:600;
            text-decoration:none;margin-top:8px;
        }
        .wgo:active{opacity:.7}

        .wtime{text-align:center;font-size:11px;color:#636366;margin-top:12px}
        .wempty{text-align:center;padding:40px 20px;color:#636366;font-size:14px;line-height:1.6}
        .wempty-icon{font-size:40px;margin-bottom:12px}
    </style>
</head>
<body>
    <div class="w">
        <div class="wh">
            ⛽ Easy Refuel
            <small id="wUpdate"></small>
        </div>

        <div id="wContent">
            <div class="wempty">
                <div class="wempty-icon">📍</div>
                Ouvrez Easy Refuel et recherchez des stations pour activer le widget
            </div>
        </div>

        <a class="wa" href="https://easy-refuel.eu">
            Ouvrir Easy Refuel →
        </a>
    </div>

    <script>
    try {
        var d = JSON.parse(localStorage.getItem('widgetData') || '{}');
        var h = JSON.parse(localStorage.getItem('fillHistory') || '[]');
        var prc = parseFloat(localStorage.getItem('prc')) || 0;
        var evPrice = parseFloat(localStorage.getItem('evPrice')) || 0;
        var mode = localStorage.getItem('appMode') || 'fuel';
        var cur = d.currency || '€';

        var content = document.getElementById('wContent');
        var wUpdate = document.getElementById('wUpdate');

        if (d.cheapest) {
            var isEv = mode === 'ev';
            var priceColor = isEv ? 'green' : 'orange';
            var currentPrice = isEv ? evPrice : prc;

            // Last update
            if (d.lastUpdate && wUpdate) {
                var diff = Date.now() - new Date(d.lastUpdate).getTime();
                var mins = Math.floor(diff / 60000);
                if (mins < 60) wUpdate.textContent = 'Mis à jour il y a ' + mins + ' min';
                else wUpdate.textContent = 'Mis à jour il y a ' + Math.floor(mins/60) + 'h';
            }

            var html = '';

            // Cheapest station
            html += '<div class="wc">';
            html += '<div class="wl">' + (isEv ? '🔋 Borne la moins chère' : '⛽ Station la moins chère') + '</div>';
            html += '<div class="ws-row">';
            html += '<span class="ws-icon">' + (isEv ? '🔋' : '⛽') + '</span>';
            html += '<div class="ws-info">';
            html += '<div class="ws-name">' + d.cheapest.name + '</div>';
            if (d.cheapest.dist) {
                html += '<div class="ws-dist">📍 ' + (d.cheapest.dist < 1 ? (d.cheapest.dist*1000).toFixed(0)+' m' : d.cheapest.dist.toFixed(1)+' km') + '</div>';
            }
            html += '</div>';
            html += '<div><div class="ws-price">' + (d.cheapest.price ? d.cheapest.price.toFixed(2) : '—') + '</div>';
            html += '<div class="ws-unit">' + cur + (isEv ? '/kWh' : '/L') + '</div></div>';
            html += '</div>';
            if (d.cheapest.lat && d.cheapest.lon) {
                html += '<a class="wgo" href="https://maps.apple.com/?daddr=' + d.cheapest.lat + ',' + d.cheapest.lon + '&dirflg=d">🧭 Y aller →</a>';
            }
            html += '</div>';

            // Price boxes
            html += '<div class="wc"><div class="wp-grid">';
            html += '<div class="wp-box"><div class="wp-value ' + priceColor + '">' + (currentPrice > 0 ? currentPrice.toFixed(2) : '—') + '</div><div class="wp-label">Votre prix ' + cur + (isEv?'/kWh':'/L') + '</div></div>';
            html += '<div class="wp-box"><div class="wp-value ' + priceColor + '">' + (d.avgPrice > 0 ? d.avgPrice.toFixed(2) : '—') + '</div><div class="wp-label">Prix moyen</div></div>';
            html += '</div></div>';

            // Last fill
            var modeH = h.filter(function(f) { return f.mode === mode; });
            if (modeH.length > 0) {
                var last = modeH[0];
                var ago = Date.now() - new Date(last.date).getTime();
                var agoTxt = Math.floor(ago/86400000) > 0 ? Math.floor(ago/86400000)+'j' : Math.floor(ago/3600000)+'h';
                html += '<div class="wc">';
                html += '<div class="wl">' + (isEv ? '🔋 Dernière recharge' : '⛽ Dernier plein') + '</div>';
                html += '<div class="wf">';
                html += '<span class="wf-icon">' + (isEv ? '🔋' : '⛽') + '</span>';
                html += '<div class="wf-info"><div class="wf-text">' + last.amount + ' ' + last.unit + ' à ' + last.pricePerUnit.toFixed(2) + cur + '</div>';
                html += '<div class="wf-date">il y a ' + agoTxt + '</div></div>';
                html += '<div class="wf-cost">' + last.totalCost.toFixed(2) + cur + '</div>';
                html += '</div></div>';
            }

            content.innerHTML = html;
        }
    } catch(e) {
        console.error(e);
    }
    </script>
</body>
</html>
